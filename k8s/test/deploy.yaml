apiVersion: v1
kind: Secret
metadata:
  name: ${IMAGE_PULL_SECRETS}
  namespace: ${K8S_NAMESPACE}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ${DOCKER_CONFIG}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${APP_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${APP_NAME}
---
apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${APP_NAME}
spec:
  type: ${SERVICE_TYPE}
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: ${APP_NAME}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${APP_NAME}
spec:
  replicas: ${REPLICAS}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: ${MAX_SURGE}
      maxUnavailable: ${MAX_UNAVAILABLE}
  selector:
    matchLabels:
      app: ${APP_NAME}
  template:
    metadata:
      labels:
        app: ${APP_NAME}
        version: ${IMAGE_TAG}
    spec:
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRETS}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ${APP_NAME}
                topologyKey: kubernetes.io/hostname
      nodeSelector:
        "kubernetes.io/hostname": k8s-node-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: ${APP_NAME}
          image: ${CI_REGISTRY_FULL_IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ${APP_NAME}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              memory: ${MEMORY_REQUEST}
              cpu: ${CPU_REQUEST}
            limits:
              memory: ${MEMORY_LIMIT}
              cpu: ${CPU_LIMIT}
          livenessProbe:
            httpGet:
              path: /health
              port: ${CONTAINER_PORT}
            initialDelaySeconds: ${LIVENESS_INITIAL_DELAY}
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: ${CONTAINER_PORT}
            initialDelaySeconds: ${READINESS_INITIAL_DELAY}
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${APP_NAME}
  namespace: ${K8S_NAMESPACE}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${APP_NAME}
  minReplicas: ${HPA_MIN_REPLICAS}
  maxReplicas: ${HPA_MAX_REPLICAS}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ${HPA_CPU_THRESHOLD}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: ${HPA_MEMORY_THRESHOLD}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: ${HPA_SCALE_DOWN_WINDOW}
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ${BACKEND_SERVICE_NAME:-riverlake-help-backend}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${BACKEND_SERVICE_NAME:-riverlake-help-backend}
spec:
  type: ClusterIP
  ports:
    - port: ${BACKEND_SERVICE_PORT:-8080}
      targetPort: ${BACKEND_CONTAINER_PORT:-8080}
      protocol: TCP
      name: http
  selector:
    app: ${BACKEND_SERVICE_NAME:-riverlake-help-backend}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${APP_NAME}
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${APP_NAME}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: "*.${INGRESS_HOST}"
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ${BACKEND_SERVICE_NAME:-riverlake-help-backend}
                port: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APP_NAME}
                port: 80
  tls:
    - hosts:
        - "*.${INGRESS_HOST}"
      secretName: ${APP_NAME}-tls-secret
