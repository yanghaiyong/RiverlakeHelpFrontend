apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: riverlake-help-tls
  namespace: riverlake-help-ns
spec:
  secretName: riverlake-help-tls-secret
  privateKey:
    algorithm: RSA
    rotationPolicy: Always
    size: 4096
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "*.test.com"
  dnsNames:
    - "*.test.com"
    - test.com
  duration: 2160h
  renewBefore: 360h
