include:
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'templates/common-vue-pipeline.yaml'

variables:
  # 构建配置
  NPM_BUILD_SHELL: 'npm install && npm run capacitor:build'
  
  # Docker 配置
  CI_REGISTRY_IMAGE: "riverlake-help-frontend"
  
  # K8s 部署配置
  APP_NAME: "riverlake-help-frontend"
  SERVICE_PORT: "80"
  CONTAINER_PORT: "80"
  PORT_NAME: "http"
  PORT_PROTOCOL: "TCP"
  NODE_SELECTOR: "k8s-node-1"
  RUN_AS_USER: "101"
  HEALTH_CHECK_PATH: "/health"
  
  # 后端服务配置
  BACKEND_SERVICE_NAME: "riverlake-help-backend"
  BACKEND_SERVICE_PORT: "8080"
  BACKEND_CONTAINER_PORT: "8080"
  
  # Ingress 配置
  INGRESS_HOST: "*.test.com"
  INGRESS_CLASS: "nginx"
  INGRESS_PROXY_BODY_SIZE: "50m"
  INGRESS_PROXY_CONNECT_TIMEOUT: "30"
  INGRESS_PROXY_READ_TIMEOUT: "60"
  INGRESS_PROXY_SEND_TIMEOUT: "60"
  INGRESS_USE_REGEX: "true"
  INGRESS_API_PATH: "/api(/|$)(.*)"
  INGRESS_API_PATH_TYPE: "ImplementationSpecific"
  INGRESS_WEB_PATH: "/"
  INGRESS_WEB_PATH_TYPE: "Prefix"
  
  # 资源配置（覆盖模板默认值，减少 HPA 触发）
  MEMORY_REQUEST: "128Mi"
  MEMORY_LIMIT: "256Mi"
  CPU_REQUEST: "500m"
  CPU_LIMIT: "1000m"
  
  # TLS 配置
  TLS_COMMON_NAME: "*.test.com"
  TLS_DNS_NAME: "*.test.com"
  TLS_BASE_DOMAIN: "test.com"

# 覆盖部署步骤，添加 envsubst 变量替换
deploy:pre-prod:
  extends: .deploy
  before_script:
    - |
      # 替换 k8s YAML 文件中的变量
      export K8S_FILE="k8s/pre-prod/deploy.yaml"
      envsubst < $K8S_FILE > $K8S_FILE.tmp && mv $K8S_FILE.tmp $K8S_FILE
      cat $K8S_FILE
  script:
    - kubectl apply -f $K8S_FILE --record

deploy:prod:
  extends: .deploy
  before_script:
    - |
      # 替换 k8s YAML 文件中的变量
      export K8S_FILE="k8s/prod/deploy.yaml"
      envsubst < $K8S_FILE > $K8S_FILE.tmp && mv $K8S_FILE.tmp $K8S_FILE
      cat $K8S_FILE
  script:
    - kubectl apply -f $K8S_FILE --record
