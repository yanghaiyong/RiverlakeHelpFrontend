include:
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'templates/common-vue-pipeline.yaml'

variables:
  # 构建配置
  NPM_BUILD_SHELL: 'npm install && npm run capacitor:build'
  
  # Docker 配置
  CI_REGISTRY: "k8s-node-1:5000"
  CI_REGISTRY_IMAGE: "riverlake-help-frontend"
  DOCKERFILE_PATH: "Dockerfile"
  
  # K8s 部署配置
  APP_NAME: "riverlake-help-frontend"
  K8S_BASE_PATH: "k8s"
  
  # 资源配置
  REPLICAS: "1"
  SERVICE_PORT: "80"
  CONTAINER_PORT: "80"
  MEMORY_REQUEST: "128Mi"
  MEMORY_LIMIT: "256Mi"
  CPU_REQUEST: "500m"
  CPU_LIMIT: "1000m"
  SERVICE_TYPE: "ClusterIP"
  IMAGE_PULL_POLICY: "Always"
  
  # Ingress/TLS 配置（通配符域名）
  INGRESS_HOST: "test.com"
  TLS_COMMON_NAME: "*.test.com"
  TLS_DNS_NAME: "*.test.com"
  TLS_BASE_DOMAIN: "test.com"
