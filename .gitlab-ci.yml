include:
  - project: 'cidevops/java-cicd-template'
    ref: master
    file: 'templates/common-vue-pipeline.yaml'

variables:
  # 构建配置
  NPM_BUILD_SHELL: "npm install && npm run capacitor:build"
  ARTIFACTS: "dist/"
  CACHE_DIR: "node_modules/"
  
  # Docker 配置
  CI_REGISTRY: "k8s-node-1:5000"
  CI_REGISTRY_IMAGE: "riverlake-help-frontend"
  DOCKERFILE_PATH: "Dockerfile"
  
  # K8s 部署配置
  K8S_YAML: "k8s/dev/deploy.yaml"
  K8S_NAMESPACE: "riverlake-help-ns"
  APP_NAME: "riverlake-help-frontend"
  
  # 环境变量
  REPLICAS: "2"
  SERVICE_PORT: "80"
  CONTAINER_PORT: "80"
  NODE_PORT: "30080"
  MEMORY_REQUEST: "64Mi"
  MEMORY_LIMIT: "128Mi"
  CPU_REQUEST: "50m"
  CPU_LIMIT: "200m"
  SERVICE_TYPE: "ClusterIP"
  HEALTH_CHECK_PATH: "/"
  IMAGE_PULL_POLICY: "Always"

stages:
  - build
  - docker
  - deploy

npm_build:
  extends: .npm_build

docker_upload:
  extends: .docker_upload_frontend

k8s_deploy:
  extends: .k8s_deploy_frontend
